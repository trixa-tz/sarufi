name: sarufi
description: >-
  A modern, null-safe Dart & Flutter SDK for the Sarufi Conversational AI
  platform - build, train and chat with Swahili-first chatbots.
version: 1.0.0
homepage: https://github.com/trixa-tz/sarufi
repository: https://github.com/trixa-tz/sarufi
issue_tracker: https://github.com/trixa-tz/sarufi/issues
documentation: https://docs.sarufi.io

topics:
  - sarufi
  - chatbot
  - conversational-ai
  - nlp
  - sdk

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  http: ^1.2.2
  logging: ^1.2.0
  uuid: ^4.5.1
  yaml: ^3.1.2

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.8
